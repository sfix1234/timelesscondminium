<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROPERTY | THE SILENCE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="property-page">
  <header class="property-page__header">
    <a href="index.html" class="property-page__home">HOME</a>
    <span class="property-page__brand">THE SILENCE</span>
  </header>

  <main>
    <section class="property-hero">
      <div class="property-hero__overlay"></div>
      <div class="property-hero__inner">
        <p class="property-hero__kicker">THE SILENCE Furnished by ARMANI/CASA</p>
        <h1 class="property-hero__title">PROPERTY</h1>
        <p class="property-hero__lead">上七軒の静寂に佇む、旧長谷川邸の記憶を継ぐ邸宅。</p>
      </div>
    </section>

    <section class="property-detail">
      <div class="property-detail__inner">
        <h2 class="property-detail__title">物件概要</h2>
        <dl class="property-detail__list">
          <div class="property-detail__row">
            <dt>所在地</dt>
            <dd>京都市上京区上七軒（旧 長谷川邸）</dd>
          </div>
          <div class="property-detail__row">
            <dt>用途</dt>
            <dd>高級分譲コンドミニアム</dd>
          </div>
          <div class="property-detail__row">
            <dt>設計監修</dt>
            <dd>隈研吾（Kuma Kengo）</dd>
          </div>
          <div class="property-detail__row">
            <dt>施工</dt>
            <dd>金剛組（Kongo-Gumi）</dd>
          </div>
          <div class="property-detail__row">
            <dt>インテリア</dt>
            <dd>ARMANI / CASA</dd>
          </div>
        </dl>
      </div>
    </section>

    <section class="property-visual">
      <img src="assets/images/stage-message.jpeg" alt="邸宅イメージ" class="property-visual__image">
    </section>

    <section class="property-contact">
      <h2 class="property-contact__title">お問い合わせ</h2>
      <p class="property-contact__text">物件詳細・販売スケジュールは下記フォームよりお問い合わせください。</p>
      <a href="https://fido-co.com/contact/" class="property-contact__button">CONTACT</a>
    </section>
  </main>
</body>
</html>

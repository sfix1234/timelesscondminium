<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE TIMELESS CONDOMINIUM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ===== Hero Section ===== */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* Background image */
    .hero__bg {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=1080&q=80') center center / cover no-repeat;
      z-index: 0;
    }

    /* Dark overlay */
    .hero__overlay {
      position: absolute;
      inset: 0;
      background: rgba(30, 20, 10, 0.45);
      z-index: 1;
    }

    /* All content above overlay */
    .hero__content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    /* ----- Header ----- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0;
      width: 100%;
      flex-shrink: 0;
    }

    /* JPN badge + drop line */
    .jpn-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .jpn-badge__label {
      background: #b22222;
      color: #fff;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 14px 14px 12px;
      line-height: 1;
    }

    .jpn-badge__line {
      width: 1px;
      height: 40px;
      background: rgba(255, 255, 255, 0.7);
      margin-top: 0;
    }

    /* Center logo (sample) */
    .header__logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 16px;
      gap: 2px;
    }

    .header__logo-main {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .header__logo-sub {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 7px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.75;
    }

    /* Hamburger menu */
    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 22px 20px;
      cursor: pointer;
    }

    .hamburger__line {
      width: 28px;
      height: 1px;
      background: #fff;
    }

    /* ----- Center text ----- */
    .center-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-bottom: 8vh;
    }

    .center-block__title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(22px, 5.5vw, 32px);
      letter-spacing: 6px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.6;
      color: #fff;
    }

    .center-block__number {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(52px, 14vw, 80px);
      letter-spacing: 4px;
      margin-top: 5vh;
      line-height: 1;
      color: #fff;
    }

    .center-block__line {
      width: 28px;
      height: 1px;
      background: rgba(255, 255, 255, 0.6);
      margin-top: 18px;
    }

    /* ----- Bottom logo ----- */
    .bottom-logo {
      width: 100%;
      padding: 0 0 5vh;
      text-align: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .bottom-logo__main {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(40px, 12vw, 72px);
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 0.95;
      white-space: nowrap;
      color: #fff;
    }

    .bottom-logo__sub {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(24px, 7.5vw, 48px);
      letter-spacing: 4px;
      text-transform: uppercase;
      line-height: 1.1;
      white-space: nowrap;
      color: #fff;
    }
    /* ===== Section 02 — Story ===== */
    .story {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .story__bg {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1080&q=80') center center / cover no-repeat;
      z-index: 0;
    }

    .story__overlay {
      position: absolute;
      inset: 0;
      background: rgba(20, 15, 10, 0.55);
      z-index: 1;
    }

    .story__content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    /* Vertical text block — top right */
    .story__vertical-text {
      position: absolute;
      top: 12vh;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      gap: clamp(16px, 4vw, 28px);
      z-index: 2;
    }

    .story__vertical-col {
      writing-mode: vertical-rl;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      font-size: clamp(13px, 3.2vw, 18px);
      letter-spacing: 0.35em;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.92);
    }

    /* Center brand block */
    .story__brand {
      position: absolute;
      bottom: 20vh;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    .story__brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(28px, 7.5vw, 44px);
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #fff;
    }

    .story__brand-sub {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: 10px;
    }

    .story__brand-furnished {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(9px, 2.2vw, 12px);
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
    }

    .story__brand-armani {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(14px, 3.8vw, 22px);
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
    }
  </style>
</head>
<body>
  <section class="hero">
    <!-- Background -->
    <div class="hero__bg"></div>
    <!-- Overlay -->
    <div class="hero__overlay"></div>

    <!-- Content -->
    <div class="hero__content">

      <!-- Header -->
      <header class="header">
        <!-- JPN Badge -->
        <div class="jpn-badge">
          <span class="jpn-badge__label">JPN</span>
          <span class="jpn-badge__line"></span>
        </div>

        <!-- Center Logo -->
        <div class="header__logo">
          <span class="header__logo-main">The Timeless</span>
          <span class="header__logo-sub">Condominium</span>
        </div>

        <!-- Hamburger -->
        <div class="hamburger" role="button" aria-label="Menu">
          <span class="hamburger__line"></span>
          <span class="hamburger__line"></span>
        </div>
      </header>

      <!-- Center -->
      <div class="center-block">
        <h1 class="center-block__title">
          The Timeless<br>Condominium
        </h1>
        <span class="center-block__number">01</span>
        <span class="center-block__line"></span>
      </div>

      <!-- Bottom Logo -->
      <div class="bottom-logo">
        <div class="bottom-logo__main">The Timeless</div>
        <div class="bottom-logo__sub">Condominium</div>
      </div>

    </div>
  </section>

  <!-- ===== Section 02 — Story ===== -->
  <section class="story">
    <div class="story__bg"></div>
    <div class="story__overlay"></div>

    <div class="story__content">
      <!-- Vertical Japanese text — top right -->
      <div class="story__vertical-text">
        <span class="story__vertical-col">日本の素晴らしき物語を</span>
        <span class="story__vertical-col">一〇〇年後の世界に紡ぐ</span>
      </div>

      <!-- Brand block — center lower -->
      <div class="story__brand">
        <span class="story__brand-name">The Silence</span>
        <div class="story__brand-sub">
          <span class="story__brand-furnished">Furnished by</span>
          <span class="story__brand-armani">Armani/Casa</span>
        </div>
      </div>
    </div>
  </section>
</body>
</html>

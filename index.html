<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE TIMELESS CONDOMINIUM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ===== Hero Section ===== */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* Background image */
    .hero__bg {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=1080&q=80') center center / cover no-repeat;
      z-index: 0;
    }

    /* Dark overlay */
    .hero__overlay {
      position: absolute;
      inset: 0;
      background: rgba(30, 20, 10, 0.45);
      z-index: 1;
    }

    /* All content above overlay */
    .hero__content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    /* ----- Header ----- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0;
      width: 100%;
      flex-shrink: 0;
    }

    /* JPN badge + drop line */
    .jpn-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .jpn-badge__label {
      background: #b22222;
      color: #fff;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 14px 14px 12px;
      line-height: 1;
    }

    .jpn-badge__line {
      width: 1px;
      height: 40px;
      background: rgba(255, 255, 255, 0.7);
      margin-top: 0;
    }

    /* Center logo (sample) */
    .header__logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 16px;
      gap: 2px;
    }

    .header__logo-main {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .header__logo-sub {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 7px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.75;
    }

    /* Hamburger menu */
    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 22px 20px;
      cursor: pointer;
      z-index: 10001;
      position: relative;
    }

    .hamburger__line {
      width: 28px;
      height: 1px;
      background: #fff;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                  opacity 0.3s ease;
      transform-origin: center;
    }

    /* Hamburger → X animation */
    .hamburger.is-open .hamburger__line:nth-child(1) {
      transform: translateY(3.5px) rotate(45deg);
    }

    .hamburger.is-open .hamburger__line:nth-child(2) {
      transform: translateY(-3.5px) rotate(-45deg);
    }

    /* ===== Fullscreen Nav Overlay ===== */
    .nav-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      pointer-events: none;
      overflow: hidden;
    }

    .nav-overlay__bg {
      position: absolute;
      inset: 0;
      background: rgba(8, 6, 4, 0.97);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .nav-overlay.is-open {
      pointer-events: auto;
    }

    .nav-overlay.is-open .nav-overlay__bg {
      opacity: 1;
    }

    .nav-overlay__inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px 20px 60px;
    }

    /* Gold accent line */
    .nav-overlay__accent {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(198, 168, 124, 0.6), transparent);
      margin-bottom: 40px;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s;
    }

    .nav-overlay.is-open .nav-overlay__accent {
      width: 80px;
    }

    /* Nav links */
    .nav-overlay__list {
      list-style: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .nav-overlay__item {
      overflow: hidden;
    }

    .nav-overlay__link {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(26px, 7vw, 42px);
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      padding: 10px 0;
      transform: translateY(110%);
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                  color 0.3s ease;
    }

    .nav-overlay__link:hover {
      color: rgba(198, 168, 124, 0.9);
    }

    .nav-overlay.is-open .nav-overlay__item:nth-child(1) .nav-overlay__link {
      transform: translateY(0);
      transition-delay: 0.25s;
    }
    .nav-overlay.is-open .nav-overlay__item:nth-child(2) .nav-overlay__link {
      transform: translateY(0);
      transition-delay: 0.35s;
    }
    .nav-overlay.is-open .nav-overlay__item:nth-child(3) .nav-overlay__link {
      transform: translateY(0);
      transition-delay: 0.45s;
    }
    .nav-overlay.is-open .nav-overlay__item:nth-child(4) .nav-overlay__link {
      transform: translateY(0);
      transition-delay: 0.55s;
    }
    .nav-overlay.is-open .nav-overlay__item:nth-child(5) .nav-overlay__link {
      transform: translateY(0);
      transition-delay: 0.65s;
    }

    /* Bottom info */
    .nav-overlay__footer {
      margin-top: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease 0.7s, transform 0.6s ease 0.7s;
    }

    .nav-overlay.is-open .nav-overlay__footer {
      opacity: 1;
      transform: translateY(0);
    }

    .nav-overlay__footer-line {
      width: 1px;
      height: 30px;
      background: rgba(198, 168, 124, 0.4);
    }

    .nav-overlay__footer-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
    }

    /* ----- Center text ----- */
    .center-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-bottom: 8vh;
    }

    .center-block__title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(22px, 5.5vw, 32px);
      letter-spacing: 6px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.6;
      color: #fff;
    }

    .center-block__number {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(52px, 14vw, 80px);
      letter-spacing: 4px;
      margin-top: 5vh;
      line-height: 1;
      color: #fff;
    }

    .center-block__line {
      width: 28px;
      height: 1px;
      background: rgba(255, 255, 255, 0.6);
      margin-top: 18px;
    }

    /* ----- Bottom logo ----- */
    .bottom-logo {
      width: 100%;
      padding: 0 0 5vh;
      text-align: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .bottom-logo__main {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(40px, 12vw, 72px);
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 0.95;
      white-space: nowrap;
      color: #fff;
    }

    .bottom-logo__sub {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(24px, 7.5vw, 48px);
      letter-spacing: 4px;
      text-transform: uppercase;
      line-height: 1.1;
      white-space: nowrap;
      color: #fff;
    }
    /* ===== Section 02 — Story ===== */
    .story {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .story__bg {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1080&q=80') center center / cover no-repeat;
      z-index: 0;
    }

    .story__overlay {
      position: absolute;
      inset: 0;
      background: rgba(20, 15, 10, 0.55);
      z-index: 1;
    }

    .story__content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    /* Vertical text block — top right */
    .story__vertical-text {
      position: absolute;
      top: 12vh;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      gap: clamp(16px, 4vw, 28px);
      z-index: 2;
    }

    .story__vertical-col {
      writing-mode: vertical-rl;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      font-size: clamp(13px, 3.2vw, 18px);
      letter-spacing: 0.35em;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.92);
    }

    /* Center brand block */
    .story__brand {
      position: absolute;
      bottom: 20vh;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    .story__brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(28px, 7.5vw, 44px);
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #fff;
    }

    .story__brand-sub {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: 10px;
    }

    .story__brand-furnished {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(9px, 2.2vw, 12px);
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
    }

    .story__brand-armani {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(14px, 3.8vw, 22px);
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
    }

    /* ===== Intro Overlay ===== */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .intro__line {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(198, 168, 124, 0.8), transparent);
      transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .intro__title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(24px, 6vw, 40px);
      letter-spacing: 12px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .intro__title span {
      display: inline-block;
      transform: translateY(110%);
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .intro__sub {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(11px, 2.8vw, 16px);
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(198, 168, 124, 0.8);
      overflow: hidden;
    }

    .intro__sub span {
      display: inline-block;
      transform: translateY(110%);
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s;
    }

    /* Intro active states */
    .intro.step-1 .intro__title span {
      transform: translateY(0);
    }

    .intro.step-1 .intro__sub span {
      transform: translateY(0);
    }

    .intro.step-1 .intro__line {
      width: 120px;
    }

    /* Curtain split */
    .intro__curtain-top,
    .intro__curtain-bottom {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      background: #0a0a0a;
      z-index: 1;
      transition: transform 1.2s cubic-bezier(0.76, 0, 0.24, 1);
    }

    .intro__curtain-top { top: 0; }
    .intro__curtain-bottom { bottom: 0; }

    .intro__center {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .intro.step-2 .intro__curtain-top {
      transform: translateY(-100%);
    }

    .intro.step-2 .intro__curtain-bottom {
      transform: translateY(100%);
    }

    .intro.step-2 .intro__center {
      opacity: 0;
      transition: opacity 0.4s ease-out;
    }

    .intro.step-3 {
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease-out 0.2s;
    }

    /* ===== Scroll lock during intro ===== */
    html.no-scroll,
    html.no-scroll body {
      overflow: hidden;
      height: 100%;
    }

    /* ===== Animations & Keyframes ===== */
    @keyframes kenBurns {
      0%   { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.15) translate(-1.5%, -1%); }
    }

    @keyframes kenBurns2 {
      0%   { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.12) translate(1%, -1.5%); }
    }

    @keyframes clipRevealUp {
      from { clip-path: inset(100% 0 0 0); }
      to   { clip-path: inset(0 0 0 0); }
    }

    @keyframes clipRevealDown {
      from { clip-path: inset(0 0 100% 0); }
      to   { clip-path: inset(0 0 0 0); }
    }

    @keyframes clipRevealCenter {
      from { clip-path: inset(50% 50% 50% 50%); }
      to   { clip-path: inset(0 0 0 0); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(40px); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-25px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes growLine {
      from { transform: scaleY(0); }
      to   { transform: scaleY(1); }
    }

    @keyframes lineExpand {
      from { width: 0; }
      to   { width: 28px; }
    }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 0.7; }
    }

    /* Hero — Ken Burns background */
    .hero__bg {
      animation: kenBurns 18s ease-out forwards;
      will-change: transform;
    }

    /* Hero — header: initially hidden, JS triggers */
    .jpn-badge__label {
      clip-path: inset(0 0 100% 0);
      animation: clipRevealDown 0.7s cubic-bezier(0.16, 1, 0.3, 1) paused forwards;
    }

    .jpn-badge__line {
      transform-origin: top;
      transform: scaleY(0);
      animation: growLine 0.6s ease-out paused forwards;
    }

    .header__logo {
      opacity: 0;
      animation: fadeSlideDown 1s cubic-bezier(0.16, 1, 0.3, 1) paused forwards;
    }

    .hamburger {
      opacity: 0;
      animation: fadeSlideDown 1s cubic-bezier(0.16, 1, 0.3, 1) paused forwards;
    }

    /* Hero — center block: clip-path reveal */
    .center-block__title {
      clip-path: inset(100% 0 0 0);
      animation: clipRevealUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) paused forwards;
    }

    .center-block__number {
      opacity: 0;
      animation: fadeSlideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) paused forwards;
    }

    .center-block__line {
      width: 0;
      animation: lineExpand 0.8s ease-out paused forwards;
    }

    /* Hero — bottom logo: dramatic scale reveal */
    .bottom-logo__main {
      clip-path: inset(100% 0 0 0);
      animation: clipRevealUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) paused forwards;
    }

    .bottom-logo__sub {
      clip-path: inset(100% 0 0 0);
      animation: clipRevealUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) paused forwards;
    }

    /* Gold shimmer on bottom logo */
    .bottom-logo__main::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 30%, rgba(198, 168, 124, 0.15) 50%, transparent 70%);
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out 4.5s 1 forwards;
      pointer-events: none;
    }

    .bottom-logo__main {
      position: relative;
    }

    /* ===== Section 02 — scroll-triggered ===== */
    .story__bg {
      animation: kenBurns2 20s ease-out paused forwards;
      will-change: transform;
    }

    /* Vertical text: each column clip reveals */
    .story__vertical-col {
      clip-path: inset(100% 0 0 0);
      transition: clip-path 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .story__vertical-col:nth-child(2) {
      transition-delay: 0.35s;
    }

    /* Brand block */
    .story__brand-name {
      clip-path: inset(0 100% 0 0);
      transition: clip-path 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s;
    }

    .story__brand-sub {
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 1s ease-out 1s, transform 1s ease-out 1s;
    }

    /* Section divider line (new element) */
    .story__divider {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(198, 168, 124, 0.6), transparent);
      margin-top: 20px;
      transition: width 1.2s ease-out 1.2s;
    }

    /* Active states when scrolled into view */
    .story.is-visible .story__bg {
      animation-play-state: running;
    }

    .story.is-visible .story__vertical-col {
      clip-path: inset(0 0 0 0);
    }

    .story.is-visible .story__brand-name {
      clip-path: inset(0 0 0 0);
    }

    .story.is-visible .story__brand-sub {
      opacity: 1;
      transform: translateY(0);
    }

    .story.is-visible .story__divider {
      width: 60px;
    }

    /* Overlay breathing glow */
    .story__overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(198, 168, 124, 0.05) 0%, transparent 70%);
      animation: breathe 5s ease-in-out infinite;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- ===== Cinematic Intro Overlay ===== -->
  <div class="intro" id="intro">
    <div class="intro__curtain-top"></div>
    <div class="intro__curtain-bottom"></div>
    <div class="intro__center">
      <div class="intro__title"><span>The Timeless</span></div>
      <div class="intro__line"></div>
      <div class="intro__sub"><span>Condominium</span></div>
    </div>
  </div>

  <!-- ===== Fullscreen Nav Overlay ===== -->
  <nav class="nav-overlay" id="navOverlay">
    <div class="nav-overlay__bg"></div>
    <div class="nav-overlay__inner">
      <div class="nav-overlay__accent"></div>
      <ul class="nav-overlay__list">
        <li class="nav-overlay__item"><a href="#" class="nav-overlay__link">Concept</a></li>
        <li class="nav-overlay__item"><a href="#" class="nav-overlay__link">Design</a></li>
        <li class="nav-overlay__item"><a href="#" class="nav-overlay__link">Location</a></li>
        <li class="nav-overlay__item"><a href="#" class="nav-overlay__link">Plan</a></li>
        <li class="nav-overlay__item"><a href="#" class="nav-overlay__link">Access</a></li>
      </ul>
      <div class="nav-overlay__footer">
        <div class="nav-overlay__footer-line"></div>
        <span class="nav-overlay__footer-text">The Timeless Condominium</span>
      </div>
    </div>
  </nav>

  <section class="hero">
    <!-- Background -->
    <div class="hero__bg"></div>
    <!-- Overlay -->
    <div class="hero__overlay"></div>

    <!-- Content -->
    <div class="hero__content">

      <!-- Header -->
      <header class="header">
        <!-- JPN Badge -->
        <div class="jpn-badge">
          <span class="jpn-badge__label">JPN</span>
          <span class="jpn-badge__line"></span>
        </div>

        <!-- Center Logo -->
        <div class="header__logo">
          <span class="header__logo-main">The Timeless</span>
          <span class="header__logo-sub">Condominium</span>
        </div>

        <!-- Hamburger -->
        <div class="hamburger" role="button" aria-label="Menu">
          <span class="hamburger__line"></span>
          <span class="hamburger__line"></span>
        </div>
      </header>

      <!-- Center -->
      <div class="center-block">
        <h1 class="center-block__title">
          The Timeless<br>Condominium
        </h1>
        <span class="center-block__number">01</span>
        <span class="center-block__line"></span>
      </div>

      <!-- Bottom Logo -->
      <div class="bottom-logo">
        <div class="bottom-logo__main">The Timeless</div>
        <div class="bottom-logo__sub">Condominium</div>
      </div>

    </div>
  </section>

  <!-- ===== Section 02 — Story ===== -->
  <section class="story">
    <div class="story__bg"></div>
    <div class="story__overlay"></div>

    <div class="story__content">
      <!-- Vertical Japanese text — top right -->
      <div class="story__vertical-text">
        <span class="story__vertical-col">日本の素晴らしき物語を</span>
        <span class="story__vertical-col">一〇〇年後の世界に紡ぐ</span>
      </div>

      <!-- Brand block — center lower -->
      <div class="story__brand">
        <span class="story__brand-name">The Silence</span>
        <div class="story__brand-sub">
          <span class="story__brand-furnished">Furnished by</span>
          <span class="story__brand-armani">Armani/Casa</span>
        </div>
        <div class="story__divider"></div>
      </div>
    </div>
  </section>

  <script>
    (() => {
      const intro = document.getElementById('intro');
      const html = document.documentElement;

      // Lock scroll during intro
      html.classList.add('no-scroll');

      // Helper: play a paused CSS animation after delay (ms)
      function playAfter(selector, delay) {
        setTimeout(() => {
          document.querySelectorAll(selector).forEach(el => {
            el.style.animationPlayState = 'running';
          });
        }, delay);
      }

      // === INTRO SEQUENCE ===
      // Step 1: reveal intro text (after brief pause)
      setTimeout(() => intro.classList.add('step-1'), 300);

      // Step 2: curtain split
      setTimeout(() => intro.classList.add('step-2'), 2200);

      // Step 3: fade out intro overlay + unlock scroll
      setTimeout(() => {
        intro.classList.add('step-3');
        html.classList.remove('no-scroll');
      }, 3000);

      // Remove intro from DOM after animation
      setTimeout(() => intro.remove(), 4000);

      // === HERO STAGED ANIMATIONS (start when curtain opens) ===
      const heroStart = 2400;

      // Header elements
      playAfter('.jpn-badge__label', heroStart);
      playAfter('.jpn-badge__line', heroStart + 400);
      playAfter('.header__logo', heroStart + 200);
      playAfter('.hamburger', heroStart + 200);

      // Center block
      playAfter('.center-block__title', heroStart + 500);
      playAfter('.center-block__number', heroStart + 1000);
      playAfter('.center-block__line', heroStart + 1500);

      // Bottom logo
      playAfter('.bottom-logo__main', heroStart + 800);
      playAfter('.bottom-logo__sub', heroStart + 1100);

      // === SCROLL-TRIGGERED ANIMATIONS ===
      const scrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            scrollObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.2 });

      document.querySelectorAll('.story').forEach(el => scrollObserver.observe(el));

      // === HAMBURGER MENU ===
      const hamburger = document.querySelector('.hamburger');
      const navOverlay = document.getElementById('navOverlay');

      hamburger.addEventListener('click', () => {
        const isOpen = hamburger.classList.toggle('is-open');
        navOverlay.classList.toggle('is-open', isOpen);
        html.classList.toggle('no-scroll', isOpen);
      });

      // Close on nav link click
      navOverlay.querySelectorAll('.nav-overlay__link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          hamburger.classList.remove('is-open');
          navOverlay.classList.remove('is-open');
          html.classList.remove('no-scroll');
        });
      });

      // Close on Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && navOverlay.classList.contains('is-open')) {
          hamburger.classList.remove('is-open');
          navOverlay.classList.remove('is-open');
          html.classList.remove('no-scroll');
        }
      });

      // === PARALLAX on scroll ===
      let ticking = false;
      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(() => {
            const scrollY = window.scrollY;
            const hero = document.querySelector('.hero__bg');
            if (hero) {
              hero.style.transform = `scale(${1 + scrollY * 0.0001}) translateY(${scrollY * 0.3}px)`;
            }
            ticking = false;
          });
          ticking = true;
        }
      });
    })();
  </script>
</body>
</html>
